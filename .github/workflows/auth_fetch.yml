name: Auto Update Proxies

on:
  schedule:
    # Runs every 2 hours (At minute 0 of every 2nd hour)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

# This explicitly tells the runner engine to execute everything using Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.1.1
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "httpx[socks]"

    - name: Run Aggregator Script
      run: |
        chmod +x main.py
        python main.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add sub.txt sub_base64.txt
        if git diff --cached --quiet; then
          echo "No changes detected in proxy feeds. Skipping commit."
        else
          git commit -m "chore: automated proxy ecosystem update [skip ci]"
          git push origin main
        fi