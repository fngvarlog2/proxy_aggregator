name: Hourly Proxy Update

on:
  schedule:
    - cron: "0 * * * *" # Fires every 30 minutes
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub UI

permissions:
  contents: write # Crucial: Gives the bot permission to push sub.txt back to your repo

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Aggregator Script
        run: python scraper.py

      - name: Commit and Push Subscriptions
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sub.txt sub_base64.txt

          # Check if files changed before committing to prevent empty commit errors
          if git diff-index --quiet HEAD; then
            echo "No configuration updates detected. Skipping push."
          else
            git commit -m "Automated Sync: Updated working proxy configs [skip ci]"
            git push
          fi
