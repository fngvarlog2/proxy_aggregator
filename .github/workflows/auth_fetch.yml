name: Auto Update Proxies

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:          # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Suppress Node 20 deprecation warning

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "httpx[socks]"

      - name: Run Aggregator Script
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sub.txt sub_base64.txt
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            git commit -m "chore: automated proxy update [skip ci]"
            git push origin main
          fi