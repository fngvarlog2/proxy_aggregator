name: Auto Update Proxies

on:
  schedule:
    # Runs every 2 hours (At minute 0 of every 2nd hour)
    - cron: "0 */2 * * *"
  workflow_dispatch: # Allows you to trigger it manually from the GitHub website

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run Aggregator Script
        run: |
          chmod +x main.py
          python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if files changed to prevent empty commits
          git add sub.txt sub_base64.txt
          if git diff --cached --quiet; then
            echo "No changes detected in proxy feeds. Skipping commit."
          else
            git commit -m "chore: automated proxy ecosystem update [skip ci]"
            git push origin main
          fi
